name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      s3_bucket_name:
        description: 'S3 bucket name (must be globally unique)'
        required: false
        default: 'cc-transaction-databricks-datalake-2026'
      ec2_instance_type:
        description: 'EC2 instance type'
        required: false
        default: 't3.micro'
      ebs_volume_size:
        description: 'EBS volume size in GB'
        required: false
        default: '5'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy CloudFormation Stack
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Validate CloudFormation template
        run: |
          aws cloudformation validate-template \
            --template-body file://Infra-AWS/cf-cc-transactions-lake.yaml \
            --region us-east-1

      - name: Deploy CloudFormation stack
        run: |
          STACK_STATUS=$(aws cloudformation describe-stacks \
            --stack-name cc-transactions-lake-stack \
            --query 'Stacks[0].StackStatus' \
            --output text \
            --region us-east-1 2>/dev/null || echo "DOES_NOT_EXIST")
          echo "Stack status: $STACK_STATUS"

          PARAMS="ParameterKey=S3BucketName,ParameterValue=${{ github.event.inputs.s3_bucket_name }} \
            ParameterKey=EC2InstanceType,ParameterValue=${{ github.event.inputs.ec2_instance_type }} \
            ParameterKey=EBSVolumeSize,ParameterValue=${{ github.event.inputs.ebs_volume_size }} \
            ParameterKey=KeyName,ParameterValue=cc-transactions-lake-key \
            ParameterKey=GitHubRepoURL,ParameterValue=https://github.com/${{ github.repository }}.git"

          if [ "$STACK_STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Stack is in ROLLBACK_COMPLETE — deleting before recreating..."
            aws cloudformation delete-stack --stack-name cc-transactions-lake-stack --region us-east-1
            aws cloudformation wait stack-delete-complete --stack-name cc-transactions-lake-stack --region us-east-1
            STACK_STATUS="DOES_NOT_EXIST"
          fi

          if [ "$STACK_STATUS" = "DOES_NOT_EXIST" ]; then
            echo "Creating new stack..."
            aws cloudformation create-stack \
              --stack-name cc-transactions-lake-stack \
              --template-body file://Infra-AWS/cf-cc-transactions-lake.yaml \
              --parameters $PARAMS \
              --capabilities CAPABILITY_NAMED_IAM \
              --region us-east-1
            echo "action=created" >> $GITHUB_ENV
          else
            echo "Stack exists ($STACK_STATUS) — updating..."
            UPDATE_OUTPUT=$(aws cloudformation update-stack \
              --stack-name cc-transactions-lake-stack \
              --template-body file://Infra-AWS/cf-cc-transactions-lake.yaml \
              --parameters $PARAMS \
              --capabilities CAPABILITY_NAMED_IAM \
              --region us-east-1 2>&1 || true)
            if echo "$UPDATE_OUTPUT" | grep -q "No updates are to be performed"; then
              echo "No changes detected — stack is up to date."
              echo "action=no_change" >> $GITHUB_ENV
            else
              echo "$UPDATE_OUTPUT"
              echo "action=updated" >> $GITHUB_ENV
            fi
          fi

      - name: Wait for stack operation to complete
        run: |
          if [ "$action" = "created" ]; then
            echo "Waiting for stack creation (up to 20 minutes)..."
            aws cloudformation wait stack-create-complete \
              --stack-name cc-transactions-lake-stack \
              --region us-east-1
          elif [ "$action" = "updated" ]; then
            echo "Waiting for stack update (up to 20 minutes)..."
            aws cloudformation wait stack-update-complete \
              --stack-name cc-transactions-lake-stack \
              --region us-east-1
          else
            echo "No stack operation to wait for."
          fi

      - name: Print stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name cc-transactions-lake-stack \
            --query 'Stacks[0].Outputs' \
            --output table \
            --region us-east-1
